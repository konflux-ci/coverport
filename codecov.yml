codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "40...100"

  status:
    project:
      default:
        target: auto
    patch:
      default:
        target: 80%

parsers:
  go:
    partials_as_hits: true

ignore:
  - "**/*_test.go"
  - ".claude/**"
  - "docs/**"
  - "examples/**"
  - ".github/**"
  - "test/fixtures/**"
  - "test/e2e/**"
  - "**/*.yml"
  - "**/*.yaml"
  - "**/*.toml"
  - "**/*.md"

flags:
  unit-tests:
    carryforward: true
  e2e-tests:
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
