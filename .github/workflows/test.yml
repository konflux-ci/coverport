name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-cli:
    name: CLI Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        go-version: ['1.24']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        working-directory: cli
        run: go mod download

      - name: Run tests
        working-directory: cli
        run: go test ./... -v -count=1 -race -coverprofile=coverage.out -covermode=atomic

      - name: Show coverage summary
        working-directory: cli
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload CLI coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          flags: unit-tests
          files: cli/coverage.out
          fail_ci_if_error: false

  test-instrumentation:
    name: Instrumentation Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        go-version: ['1.22', '1.23', '1.24']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        working-directory: instrumentation/go
        run: go test ./... -v -count=1 -cover -coverprofile=coverage.out -covermode=atomic

      - name: Upload instrumentation coverage to Codecov
        if: matrix.go-version == '1.24'
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          flags: unit-tests
          files: instrumentation/go/coverage.out
          fail_ci_if_error: false

  check-agents-md:
    name: Check AGENTS.md line limit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check AGENTS.md line limit
        run: |
          LINES=$(wc -l < AGENTS.md)
          if [ "$LINES" -gt 60 ]; then
            echo "ERROR: AGENTS.md exceeds 60-line limit ($LINES lines)"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: cli
          args: --timeout=5m

      - name: Lint instrumentation
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: instrumentation/go
          args: --timeout=5m

      - name: Check CLI builds
        working-directory: cli
        run: go build ./...

      - name: Check instrumentation builds
        working-directory: instrumentation/go
        run: go build ./...

  shellcheck:
    name: ShellCheck embedded scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Extract and check embedded scripts
        run: |
          EXIT_CODE=0
          for f in $(find cli/examples coverage-processor/tekton -name '*.yaml' -o -name '*.yml'); do
            # Extract script blocks from Tekton tasks
            python3 -c "
          import yaml, sys
          with open('$f') as fh:
              docs = yaml.safe_load_all(fh)
              for doc in docs:
                  if doc is None:
                      continue
                  # Walk looking for 'script' keys
                  def walk(obj, path=''):
                      if isinstance(obj, dict):
                          for k, v in obj.items():
                              if k == 'script' and isinstance(v, str):
                                  print(v)
                              else:
                                  walk(v, f'{path}.{k}')
                      elif isinstance(obj, list):
                          for item in obj:
                              walk(item, path)
                  walk(doc)
          " 2>/dev/null | while read -r script; do
              echo "$script" | shellcheck -s bash - || EXIT_CODE=1
            done
          done
          exit $EXIT_CODE
