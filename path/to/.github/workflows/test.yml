name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-cli:
    name: CLI Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        go-version: ['1.24']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        working-directory: cli
        run: go mod download

      - name: Run tests
        working-directory: cli
        run: go test ./... -v -count=1 -race -coverprofile=coverage.out -covermode=atomic

      - name: Show coverage summary
        working-directory: cli
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload CLI coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          flags: cli-tests

      - name: Upload instrumentation coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          flags: instrumentation-tests